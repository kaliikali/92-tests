// Функция перемешивания Fisher-Yates
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

let processedQuestions = [];

function initQuiz() {
    // Шаг 1. Перемешиваем общий пул вопросов
    let shuffledPool = shuffle([...rawQuestions]);
    
    const topics = {
        1: { title: "Тема 1. Бизнес статистика как наука. Предмет, метод и задачи статистики", items: [] },
        2: { title: "Тема 2. Статистическое наблюдение. Типы данных.", items: [] },
        3: { title: "Тема 3. Сводка и группировка статистических данных. Статистические ряды распределения и статистические таблицы.", items: [] },
        4: { title: "Тема 4. Сущность статистических величин (показателей), их виды. Абсолютные и относительные величины.", items: [] }
    };

    // Шаг 2. Обрабатываем каждый вопрос и распределяем по темам
    shuffledPool.forEach((item, index) => {
        const correctText = item.arr[0];
        let options = shuffle([...item.arr]); // Перемешиваем дистракторы внутри вопроса
        
        let qObj = {
            id: index,
            topic: item.t,
            questionText: item.q,
            options: options,
            correctText: correctText
        };
        
        processedQuestions.push(qObj);
        topics[item.t].items.push(qObj);
    });

    // Шаг 3. Генерируем HTML структуру с разделением по темам
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';

    [1, 2, 3, 4].forEach(topicNum => {
        if(topics[topicNum].items.length > 0) {
            const topicHeader = document.createElement('div');
            topicHeader.className = 'topic-title';
            topicHeader.innerText = topics[topicNum].title;
            container.appendChild(topicHeader);

            topics[topicNum].items.forEach((qObj, indexInTopic) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${indexInTopic + 1}. ${qObj.questionText}`;
                card.appendChild(qText);

                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';

                qObj.options.forEach(opt => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    
                    const label = document.createElement('label');
                    label.style.display = 'block';
                    label.style.cursor = 'pointer';

                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `question_${qObj.id}`;
                    radio.value = opt;

                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(` ${opt}`));
                    li.appendChild(label);
                    optionsList.appendChild(li);
                });

                card.appendChild(optionsList);
                container.appendChild(card);
            });
        }
    });
}

function checkQuiz() {
    let score = 0;
    const total = processedQuestions.length;
    const errorLogContainer = document.getElementById('error-log');
    errorLogContainer.innerHTML = '';

    processedQuestions.forEach(qObj => {
        const selectedRadio = document.querySelector(`input[name="question_${qObj.id}"]:checked`);
        const userAns = selectedRadio ? selectedRadio.value : "Ответ не выбран";
        
        if (userAns === qObj.correctText) {
            score++;
        } else {
            const errCard = document.createElement('div');
            errCard.className = 'error-item';
            
            errCard.innerHTML = `
                <div class="error-q">Тема ${qObj.topic}. ${qObj.questionText}</div>
                <p>❌ Ваш ответ: <span class="user-ans">${userAns}</span></p>
                <p>✅ Правильный ответ: <span class="correct-ans">${qObj.correctText}</span></p>
            `;
            errorLogContainer.appendChild(errCard);
        }
    });

    document.getElementById('result-summary').innerText = `Результат тестирования: ${score} из ${total} правильных ответов (${Math.round(score/total*100)}%)`;
    
    if (score === total) {
        errorLogContainer.innerHTML = '<div style="color:#27ae60; font-weight:bold; text-align:center; font-size:1.2rem;">Идеальный результат! Все ответы верны!</div>';
    }
    
    document.getElementById('result-box').style.display = 'block';
    window.scrollTo({ top: document.getElementById('result-box').offsetTop, behavior: 'smooth' });
}

window.onload = initQuiz;
</script>
