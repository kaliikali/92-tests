// Функция перемешивания элементов массива по алгоритму Фишера-Йетса
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Глобальный рабочий массив вопросов (чтобы сохранить состояние перемешивания для проверки)
let workingQuestions = [];

function initQuiz() {
    // 1. Клонируем исходную базу вопросов, чтобы не портить оригинал
    workingQuestions = JSON.parse(JSON.stringify(quizData));
    
    // 2. Перемешиваем сами вопросы на уровне всего сайта
    shuffle(workingQuestions);
    
    const container = document.getElementById('quiz-content');
    container.innerHTML = '';
    
    let currentTheme = "";
    
    // 3. Выводим вопросы на страницу
    workingQuestions.forEach((item, index) => {
        // Добавляем заголовок темы, если она сменилась при перемешивании
        if (item.theme !== currentTheme) {
            currentTheme = item.theme;
            const themeDiv = document.createElement('div');
            themeDiv.className = 'theme-title';
            themeDiv.innerText = currentTheme;
            container.appendChild(themeDiv);
        }
        
        // Для каждого вопроса сохраняем эталонный правильный ответ перед перемешиванием вариантов
        const correctAnswerText = item.options[0];
        item.correctText = correctAnswerText;
        
        // Перемешиваем варианты ответов внутри текущего вопроса
        shuffle(item.options);
        
        const qBlock = document.createElement('div');
        qBlock.className = 'question-block';
        
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = `${index + 1}. ${item.q}`;
        qBlock.appendChild(qText);
        
        const optsList = document.createElement('ul');
        optsList.className = 'options-list';
        
        item.options.forEach((option) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question_${item.id}`;
            radio.value = option;
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(option));
            li.appendChild(label);
            optsList.appendChild(li);
        });
        
        qBlock.appendChild(optsList);
        container.appendChild(qBlock);
    });
}

function checkQuiz() {
    let correctCount = 0;
    let totalQuestions = workingQuestions.length;
    const errorDetailsContainer = document.getElementById('error-details');
    errorDetailsContainer.innerHTML = '';
    
    workingQuestions.forEach((item, index) => {
        const radios = document.getElementsByName(`question_${item.id}`);
        let selectedValue = null;
        
        for (let radio of radios) {
            if (radio.checked) {
                selectedValue = radio.value;
                break;
            }
        }
        
        if (selectedValue === item.correctText) {
            correctCount++;
        } else {
            // Если ответ неверный или не выбран вообще
            const errorBlock = document.createElement('div');
            errorBlock.className = 'error-item';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'error-q';
            qTitle.innerText = `Вопрос: ${item.q}`;
            
            const userAns = document.createElement('div');
            userAns.className = 'user-ans';
            userAns.innerText = `Ваш ответ: ${selectedValue ? selectedValue : 'Не выбран'}`;
            
            const correctAns = document.createElement('div');
            correctAns.className = 'correct-ans';
            correctAns.innerText = `Правильный ответ: ${item.correctText}`;
            
            errorBlock.appendChild(qTitle);
            errorBlock.appendChild(userAns);
            errorBlock.appendChild(correctAns);
            errorDetailsContainer.appendChild(errorBlock);
        }
    });
    
    // Вывод общих результатов
    const summary = document.getElementById('summary');
    summary.innerText = `Результат: ${correctCount} из ${totalQuestions} правильных ответов.`;
    
    if (correctCount === totalQuestions) {
        summary.className = "results-summary summary-good";
        summary.innerText += " Прекрасный результат! Ни одной ошибки.";
    } else {
        summary.className = "results-summary summary-bad";
    }
    
    const resultsBlock = document.getElementById('results');
    resultsBlock.style.display = 'block';
    
    // Плавный скролл к блоку результатов
    resultsBlock.scrollIntoView({ behavior: 'smooth' });
}

// Инициализация при первой загрузке страницы
window.onload = initQuiz;
